<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css box model</title>
    <style>
        .box{
            background-color: aqua;
        }

        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            margin: 25px;
            padding: 10px;
            color: red;
            border: 4px solid blue;
            box-sizing: border-box;
            height: 200px;
        }
        .box2{
            margin: 35px;
            padding: 10px;
            color: red;
            border: 4px solid blue;
            box-sizing: border-box; 
            height: 200px;
            /* text-align: center; */
        }

        
    </style>
</head>
<body>
    <div class="box box1">I am div</div>
    <div class="box box2">I am another div</div>

    
</body>
</html>
