<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Again making card</title>
    <style>
        body {
            background-color: grey;
            padding: 45px;
        }

        .card {
            background-color: white;
            /* height: 244px; */
            width: 198px;
            border-radius: 6px;
        }

        .image {
            padding: 7px;
            border-radius: 6px;

        }

        .image img {
            width: 186px;
            border-radius: 7px;

        }
        .capsules{
            padding: 0px 28px 0px 14px ;
            color: grey;
        }
        .capsules span{
            border: 1px solid black;
            border-radius: 9px;
            padding: 1px 8px;
            font-size: 10px;
        }
        .content{
           padding: 7px 13px; 
           font-family: 'Times New Roman', Times, serif;
          
            
        }
        .content p{
            font-size: 9px;
            color: grey;

        }
        .button{
            text-align: center;
        }
        .button button{
            border-radius: 12px;
            border: none;
            font-size: 11px;
            color: rgb(120, 120, 241);
            background-color: rgb(220, 236, 243);
            margin-top: 7px;
            padding: 7px 15px;
            
        }
    </style>

</head>

<body>
    <div class="card">
        <div class="image">
            <img src="view-boat-floating-water.jpg" alt="lake image">
            </div>
            <div class="capsules">
                <span>Nature</span>
                <span>Lake</span>

            </div>
            <div class="content">
                <h2>Lago di braies</h2>
                <p>Lorem Lorem ipsum dolor sit, amet consectetur adipisicing elit. Illo, odit?ipsum dolor sit amet consectetur adipisicing elit. Doloremque vel repellat incidunt earum
                    labore reprehenderim accusamus cupiditate ex sunt, est earum.</p>
            </div>
            <div class="button">
                <button>Readmore</button>
            </div>

        
    </div>

</body>

</html>
